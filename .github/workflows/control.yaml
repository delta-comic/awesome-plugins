name: 处理插件控制 Issue

on:
  issues:
    types:
      - opened
      - edited
      - reopened
      - labeled

permissions:
  contents: write
  issues: write

concurrency:
  group: plugin-registry-writes
  cancel-in-progress: false

jobs:
  control:
    if: >-
      ${{ !github.event.issue.pull_request && contains(github.event.issue.labels.*.name,
      'PluginControl') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Apply control request and rebuild catalog
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          bun begin control ${{ github.event.issue.number }}
          bun begin scan

      - name: Commit registry changes
        run: |
          git config user.name "delta-comic-bot"
          git config user.email "delta-comic-bot@proton.me"
          git add pages registry README.md

          if git diff --cached --quiet; then
            echo "No registry changes to commit"
            exit 0
          fi

          git commit -m "ci: update plugin registry [skip ci]"
          git pull --rebase origin "${{ github.event.repository.default_branch }}"
          git push origin "HEAD:${{ github.event.repository.default_branch }}"